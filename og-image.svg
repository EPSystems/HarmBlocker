<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="HarmBlocker — По-тих интернет за вашия дом">
  <title>HarmBlocker — По-тих интернет за вашия дом</title>

  <!-- Paper background -->
  <rect width="1200" height="630" fill="#f6f1e8"/>

  <!-- Faint column grid (editorial texture) -->
  <g stroke="rgba(14,20,32,0.06)" stroke-width="1" fill="none">
    <line x1="200"  y1="0" x2="200"  y2="630"/>
    <line x1="400"  y1="0" x2="400"  y2="630"/>
    <line x1="600"  y1="0" x2="600"  y2="630"/>
    <line x1="800"  y1="0" x2="800"  y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Editorial serial, top-right -->
  <text x="1120" y="52" font-family="'Instrument Serif', Georgia, serif" font-size="20" font-style="italic" fill="#b87d33" text-anchor="end">№ 001 ⁄ HB</text>

  <!-- Signet: 6 concentric rings + center, left side -->
  <g transform="translate(260,315)" stroke="#b87d33" fill="none" stroke-width="1.25">
    <circle r="20"  stroke-opacity="1.00"/>
    <circle r="50"  stroke-opacity="0.75"/>
    <circle r="90"  stroke-opacity="0.55"/>
    <circle r="130" stroke-opacity="0.40"/>
    <circle r="170" stroke-opacity="0.28"/>
    <circle r="210" stroke-opacity="0.18"/>
    <circle cx="0" cy="0" r="6" fill="#b87d33" stroke="none"/>
    <!-- Horizon lines -->
    <line x1="-250" y1="0" x2="-215" y2="0" stroke-opacity="0.35"/>
    <line x1="215"  y1="0" x2="250"  y2="0" stroke-opacity="0.35"/>
  </g>

  <!-- Wordmark + tagline, right side -->
  <g>
    <!-- Eyebrow rule -->
    <line x1="540" y1="260" x2="568" y2="260" stroke="#b87d33" stroke-width="2"/>
    <text x="580" y="266" font-family="Inter, sans-serif" font-size="16" font-weight="500" letter-spacing="2.2" fill="#5a6472">HARMBLOCKER</text>

    <!-- Headline (serif) -->
    <text x="540" y="360" font-family="'Instrument Serif', Georgia, serif" font-size="76" fill="#0e1420">По-тих интернет</text>
    <text x="540" y="440" font-family="'Instrument Serif', Georgia, serif" font-size="76" font-style="italic" fill="#b87d33">за вашия дом.</text>

    <!-- Subhead -->
    <text x="540" y="500" font-family="Inter, sans-serif" font-size="22" fill="#5a6472">Абонамент за 3€/месец. Защита за всички устройства в дома.</text>
  </g>

  <!-- Paper grain: very faint noise via fractal filter -->
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.055  0 0 0 0 0.078  0 0 0 0 0.125  0 0 0 0.06 0"/>
    </filter>
  </defs>
  <rect width="1200" height="630" filter="url(#grain)" style="mix-blend-mode:multiply"/>
</svg>
