<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Paper background so the signet stays visible on dark browser UI -->
  <rect width="24" height="24" rx="3" fill="#f6f1e8" />
  <!-- Concentric amber signet rings — 3 rings, thin strokes -->
  <g fill="none" stroke="#b87d33" stroke-width="1.25">
    <circle cx="12" cy="12" r="10.5" opacity="0.35" />
    <circle cx="12" cy="12" r="7" opacity="0.65" />
    <circle cx="12" cy="12" r="3.5" />
  </g>
  <!-- Solid center dot -->
  <circle cx="12" cy="12" r="1.5" fill="#b87d33" />
</svg>
